image: node:22-alpine

stages:
  - test
  - build
  - deploy

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .npm/

test:
  stage: test
  script:
    - npm ci
    - npm run test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build:
  stage: build
  script:
    - |
      if [ -z "$VITE_GAS_URL" ] || [ -z "$VITE_API_KEY" ]; then
        echo "ERROR: VITE_GAS_URL / VITE_API_KEY が未設定です。"
        echo "Settings → CI/CD → Variables に .env と同じ値を登録してください。"
        exit 1
      fi
    - npm ci
    - npm run build
    - cp dist/index.html dist/404.html
  artifacts:
    paths:
      - dist/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

pages:
  stage: deploy
  needs: [build]
  script:
    # リポジトリの public/（quests 用）があると mv dist public が public/dist/ になるため削除する
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
